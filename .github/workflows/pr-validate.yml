name: Application unit tests

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.13.0'
        cache: 'npm'
    - name: Install dependencies
      run: npm ci
    - name: Lint with ESLint
      run: npm run lint
    - name: Run tests
      run: npm test
      env:
        NODE_ENV: test
        PRODUCER_HOST: 127.0.0.1
        PRODUCER_PORT: 4000
        CONSUMER_HOST: 127.0.0.1
        CONSUMER_PORT: 3000
